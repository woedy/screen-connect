services:
  # -----------------------------------------------
  # PostgreSQL Database
  # -----------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-screenconnect}
      POSTGRES_USER: ${POSTGRES_USER:-screenconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-screenconnect}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-screenconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # Redis (Channel Layer + Celery Broker)
  # -----------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # Django Backend (ASGI via Daphne)
  # -----------------------------------------------
  web:
    build: ./backend
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        daphne -b 0.0.0.0 -p 8000 core.asgi:application
      "
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-super-secret-change-me-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - POSTGRES_DB=${POSTGRES_DB:-screenconnect}
      - POSTGRES_USER=${POSTGRES_USER:-screenconnect}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-screenconnect}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8000:8000"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -----------------------------------------------
  # Celery Worker
  # -----------------------------------------------
  celery_worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A core worker -l info --concurrency=2
    mem_limit: 256m
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-super-secret-change-me-in-production}
      - POSTGRES_DB=${POSTGRES_DB:-screenconnect}
      - POSTGRES_USER=${POSTGRES_USER:-screenconnect}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-screenconnect}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  # -----------------------------------------------
  # Celery Beat (Periodic Tasks)
  # -----------------------------------------------
  celery_beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A core beat -l info
    mem_limit: 128m
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-super-secret-change-me-in-production}
      - POSTGRES_DB=${POSTGRES_DB:-screenconnect}
      - POSTGRES_USER=${POSTGRES_USER:-screenconnect}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-screenconnect}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  # -----------------------------------------------
  # React Frontend (Nginx)
  # -----------------------------------------------
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - web

volumes:
  postgres_data:
